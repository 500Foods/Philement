<div class="settings-page" data-page-index="-10" id="settings-page--10">
<section class="profile-section">
<h3 class="section-title"><fa fa-00></fa> Number Formats</h3>
<form class="preferences-form">
<div class="form-group">
<label class="form-label">Decimal Separator</label>
<select class="form-select" name="decimalSeparator">
<option value=".">.</option>
<option value=",">,</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Thousands Separator</label>
<select class="form-select" name="thousandsSeparator">
<option value=",">,</option>
<option value=" ">Space</option>
<option value="'">Apostrophe</option>
<option value=".">.</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Currency Symbol</label>
<select class="form-select" name="currencySymbol">
<option value="$">$ (USD)</option>
<option value="€">€ (EUR)</option>
<option value="£">£ (GBP)</option>
<option value="¥">¥ (JPY)</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Currency Position</label>
<select class="form-select" name="currencyPosition">
<option value="before"></option>
<option value="after">100$</option>
</select>
</div>
</form>
</section>
</div>
