<div class="settings-page" data-page-index="-12" id="settings-page--12">
  <section class="profile-section">
    <div class="photo-editor-container">
      <div class="photo-editor" id="photo-editor">
        <div class="photo-image-container" id="photo-image-container">
          <img id="photo-image" class="photo-image">
        </div>
        <div class="photo-preview-overlay" id="photo-preview-overlay"></div>
        <div class="photo-slider photo-slider-top"><input type="range" id="slider-x" min="-100" max="100" value="0" class="photo-range"></div>
        <div class="photo-slider photo-slider-left"><input type="range" id="slider-y" min="-100" max="100" value="0" class="photo-range" orient="vertical"></div>
        <div class="photo-slider photo-slider-right"><input type="range" id="slider-scale" min="0.1" max="3" step="0.01" value="1" class="photo-range" orient="vertical"></div>
        <div class="photo-slider photo-slider-bottom"><input type="range" id="slider-rotation" min="-180" max="180" value="0" class="photo-range" step="1"></div>
        <div class="photo-resize-handle" id="photo-resize-handle"><fa fa-expand></fa></div>
      </div>
      <div class="lithium-toolbar" id="photo-toolbar">
        <button type="button" class="lithium-toolbar-btn" id="photo-capture-btn" data-collapsible-text data-tooltip="Capture Image" data-tip-placement="bottom">
          <fa fa-camera></fa>
        </button>
        <label class="lithium-toolbar-btn photo-upload-btn" data-collapsible-text data-tooltip="Upload Image" data-tip-placement="bottom">
          <fa fa-upload></fa>
          <input type="file" id="photo-upload" accept="image/*" hidden>
        </label>
        <label class="lithium-toolbar-btn photo-download-btn" data-collapsible-text data-tooltip="Download Image" data-tip-placement="bottom">
          <fa fa-download></fa>
        </label>
        <div class="lithium-toolbar-placeholder"></div>
        <button type="button" class="lithium-toolbar-btn photo-transform-btn" id="photo-flip-h-btn" disabled data-tooltip="Flip Horizontal" data-tip-placement="bottom">
          <fa fa-left-right></fa>
        </button>
        <button type="button" class="lithium-toolbar-btn photo-transform-btn" id="photo-flip-v-btn" disabled data-tooltip="Flip Vertical" data-tip-placement="bottom">
          <fa fa-up-down></fa>
        </button>
        <button type="button" class="lithium-toolbar-btn photo-transform-btn" id="photo-rotate-left-btn" disabled data-tooltip="Rotate Left" data-tip-placement="bottom">
          <fa fa-rotate-left></fa>
        </button>
        <button type="button" class="lithium-toolbar-btn photo-transform-btn" id="photo-rotate-right-btn" disabled data-tooltip="Rotate Right" data-tip-placement="bottom">
          <fa fa-rotate-right></fa>
        </button>
        <div class="lithium-toolbar-placeholder"></div>
        <button type="button" class="lithium-toolbar-btn" id="photo-reset-btn" data-collapsible-text data-tooltip="Default Settings" data-tip-placement="bottom">
          <fa fa-bullseye></fa>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="photo-remove-btn" disabled data-collapsible-text data-tooltip="Clear Image" data-tip-placement="bottom">
          <fa fa-trash></fa>
        </button>
        <span class="photo-status" id="photo-status"></span>
      </div>
      <div class="photo-previews">
        <img id="photo-preview-40" class="photo-preview">
        <img id="photo-preview-80" class="photo-preview">
        <img id="photo-preview-150" class="photo-preview">
      </div>
    </div>
  </section>
</div>
