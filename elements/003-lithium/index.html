<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lithium">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Lithium">
    <meta name="theme-color" content="#1A1A1A">

    <!-- Primary Meta Tags -->
    <title>Lithium - A Philement Project</title>
    <meta name="description" content="Lithium - A Philement Project. A modern Progressive Web App built with vanilla JavaScript.">
    <meta name="keywords" content="Lithium, Philement, PWA, Progressive Web App, Vanilla JavaScript, SPA">
    <meta name="author" content="Philement">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/images/logo-192x192.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- FOUC Prevention - Applied immediately before any styles -->
    <style>
      /* Prevent flash of unstyled content during load */
      html {
        background-color: #1A1A1A;
        color: #E0E0E0;
        visibility: hidden;
      }
      /* Critical dark theme variables for FOUC prevention */
      :root {
        --bg-primary: #1A1A1A;
        --bg-secondary: #242424;
        --text-primary: #E0E0E0;
        --accent-primary: #5C6BC0;
      }
    </style>

    <!-- Core Stylesheets - Loaded in dependency order -->
    <link rel="stylesheet" href="/src/styles/base.css">
    <link rel="stylesheet" href="/src/styles/layout.css">
    <link rel="stylesheet" href="/src/styles/components.css">
    <link rel="stylesheet" href="/src/styles/transitions.css">

    <!-- Third-party Styles (CDN-loaded) -->
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/0216bfa629.js" crossorigin="anonymous"></script>

    <!-- Flatpickr (date picker - loaded on demand when needed) -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css"> -->

  </head>
  <body>

    <!-- Main App Container -->
    <div id="app">
      <!-- Content loaded dynamically by app.js -->
    </div>

    <!-- Early Version Check - Non-blocking, prevents UI flash on update -->
    <script>
      (function() {
        // Store version promise globally so app.js can use it without re-fetching
        window.__lithiumVersionPromise = fetch('/version.json', { cache: 'no-store' })
          .then(r => r.json())
          .then(data => {
            const stored = sessionStorage.getItem('lithium_build');
            const current = String(data.build);
            
            // Store for app.js to use later
            window.__lithiumVersionData = data;
            
            if (stored && stored !== current) {
              // Version changed - update stored build and reload immediately
              sessionStorage.setItem('lithium_build', current);
              window.location.reload();
              return null; // Prevent further execution
            }
            
            // First visit or same version - store and continue
            sessionStorage.setItem('lithium_build', current);
            return data;
          })
          .catch(() => {
            // If fetch fails, continue with app load
            return null;
          });
      })();
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .catch(() => {
              // Silently ignore - service worker is optional
            });
        });

        // Check for updates (fallback for browsers that don't trigger the early check)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      }
    </script>

    <!-- Main App Script -->
    <script type="module" src="/src/app.js"></script>

  </body>
</html>
