<div class="manager-panels style-manager-container">
  <!-- Left Panel: Themes List (Parent Table) -->
  <div data-panel="left" id="style-left-panel">
    <div class="table-container" id="style-themes-table-container">
      <!-- Parent Tabulator table will be injected here -->
    </div>
    <div class="navigator-container" id="style-themes-navigator">
      <!-- Parent Navigator block will be injected here -->
    </div>
  </div>

  <!-- First Splitter between left and middle panels -->
  <div data-splitter="left" id="style-splitter-left"></div>

  <!-- Middle Panel: Sections List (Child Table) -->
  <div data-panel="middle" id="style-middle-panel">
    <div class="panel-header">
      <span class="panel-header-title" id="style-child-title">Select a Theme</span>
    </div>
    <div class="table-container" id="style-sections-table-container">
      <!-- Child Tabulator table will be injected here -->
    </div>
    <div class="navigator-container" id="style-sections-navigator">
      <!-- Child Navigator block will be injected here -->
    </div>
  </div>

  <!-- Second Splitter between middle and right panels -->
  <div data-splitter="right" id="style-splitter-right"></div>

  <!-- Right Panel: Tabbed View (CSS Editor, Variables, Preview) -->
  <div data-panel="right" id="style-right-panel">
    <!-- Toolbar Header -->
    <div class="tab-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <!-- Collapse/Expand buttons for tables -->
        <button type="button" class="subpanel-header-btn subpanel-header-close collapse-btn" id="style-collapse-left-btn" title="Toggle Themes Panel">
          <fa fa-angles-left id="style-collapse-left-icon"></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close collapse-btn" id="style-collapse-middle-btn" title="Toggle Sections Panel">
          <fa fa-angles-left id="style-collapse-middle-icon"></fa>
        </button>
        <!-- Tab buttons -->
        <button type="button" class="subpanel-header-btn subpanel-header-primary tab-btn active" data-tab="css">
          <fa fa-brackets-curly></fa>
          <span>CSS</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary tab-btn" data-tab="variables">
          <fa fa-sliders></fa>
          <span>Variables</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary tab-btn" data-tab="preview">
          <fa fa-eye></fa>
          <span>Preview</span>
        </button>
        <!-- Placeholder to fill space -->
        <button type="button" class="subpanel-header-btn subpanel-header-primary tab-spacer" tabindex="-1" aria-hidden="true"></button>
        <!-- Font button -->
        <button type="button" class="subpanel-header-btn subpanel-header-close" id="style-font-btn" title="Font Settings">
          <fa fa-font-case></fa>
        </button>
      </div>
    </div>

    <!-- Tab Panes -->
    <div class="tab-content">
      <!-- CSS Tab -->
      <div class="tab-pane active" id="style-tab-css">
        <div class="editor-container" id="style-css-editor"></div>
      </div>

      <!-- Variables Tab -->
      <div class="tab-pane" id="style-tab-variables">
        <div class="editor-container" id="style-variables-editor"></div>
      </div>

      <!-- Preview Tab -->
      <div class="tab-pane" id="style-tab-preview">
        <div class="preview-content" id="style-preview-content">
          <p class="preview-placeholder">Select a theme to preview</p>
        </div>
      </div>
    </div>
  </div>
</div>
