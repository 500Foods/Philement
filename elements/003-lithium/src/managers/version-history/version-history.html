<div class="manager-panels version-manager-container">
  <!-- Left Panel: Version List (Lookup 45) -->
  <div data-panel="left" id="version-left-panel">
    <div class="table-container lithium-table-container" id="version-table-container">
      <!-- Tabulator table will be injected here -->
    </div>
    <div class="navigator-container lithium-navigator-container" id="version-navigator">
      <!-- Navigator block will be injected here -->
    </div>
  </div>

  <!-- Splitter between panels -->
  <div class="lithium-splitter" id="version-splitter"></div>

  <!-- Right Panel: Markdown Preview -->
  <div data-panel="right" id="version-right-panel">
    <!-- Header -->
    <div class="tab-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <!-- Collapse button -->
        <button type="button" class="subpanel-header-btn subpanel-header-close collapse-btn" id="version-collapse-btn" title="Toggle Version List">
          <fa fa-angles-left id="version-collapse-icon"></fa>
        </button>
        <!-- Title -->
        <span class="subpanel-header-title">Version Summary</span>
        <!-- Filler -->
        <button type="button" class="subpanel-header-btn subpanel-header-primary tab-spacer" tabindex="-1" aria-hidden="true"></button>
      </div>
    </div>

    <!-- Preview Content -->
    <div class="version-preview-container" id="version-preview-content">
      <p class="version-preview-placeholder">Select a version to preview its summary</p>
    </div>
  </div>
</div>
