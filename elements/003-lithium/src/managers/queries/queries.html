<div class="queries-manager-container">
  <div class="queries-left-panel">
    <div class="queries-table-container" id="queries-table-container">
      <!-- Tabulator table will be injected here -->
    </div>
    <div class="queries-navigator-container" id="queries-navigator-container">
      <!-- Navigator block will be injected here -->
    </div>
  </div>
  <div class="queries-splitter" id="queries-splitter"></div>
  <div class="queries-right-panel">
    <div class="queries-tabs-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-collapse-btn" id="queries-collapse-btn" title="Toggle Table">
          <fa fa-angles-left id="queries-collapse-icon"></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn active" data-tab="sql">
          <fa fa-database></fa>
          <span>SQL</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="summary">
          <fa fa-file-lines></fa>
          <span>Summary</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="collection">
          <fa fa-code></fa>
          <span>Collection</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="preview">
          <fa fa-eye></fa>
          <span>Preview</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="test">
          <fa fa-flask></fa>
          <span>Test</span>
        </button>
        <div class="queries-toolbar-spacer"></div>
        <div class="queries-toolbar-placeholder"></div>
        <div class="queries-toolbar">
          <button type="button" class="queries-toolbar-btn" id="queries-undo-btn" title="Undo (Ctrl+Z)" disabled>
            <fa fa-rotate-left></fa>
          </button>
          <button type="button" class="queries-toolbar-btn" id="queries-redo-btn" title="Redo (Ctrl+Y)" disabled>
            <fa fa-rotate-right></fa>
          </button>
          <button type="button" class="queries-toolbar-btn" id="queries-font-decrease-btn" title="Decrease Font Size">
            <fa fa-font></fa>
          </button>
          <button type="button" class="queries-toolbar-btn" id="queries-font-increase-btn" title="Increase Font Size">
            <fa fa-font></fa>
          </button>
          <button type="button" class="queries-toolbar-btn" id="queries-prettify-btn" title="Pretty Print SQL">
            <fa fa-flower-tulip></fa>
          </button>
        </div>
      </div>
    </div>
    <div class="queries-tabs-content">
      <div class="queries-tab-pane active" id="queries-tab-sql">
        <div class="queries-sql-editor" id="queries-sql-editor"></div>
      </div>
      <div class="queries-tab-pane" id="queries-tab-summary">
        <!-- Summary Editor (CodeMirror with Markdown) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-collection">
        <!-- Collection Editor (JSON) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-preview">
        <!-- Preview (rendered Markdown HTML) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-test">
        <!-- Test Tab (run query) -->
      </div>
    </div>
  </div>
</div>
