<div class="queries-manager-container">
  <div class="queries-left-panel">
    <div class="queries-table-container" id="queries-table-container">
      <!-- Tabulator table will be injected here -->
    </div>
    <div class="queries-navigator-container" id="queries-navigator-container">
      <!-- Navigator block will be injected here -->
    </div>
  </div>
  <div class="queries-splitter" id="queries-splitter"></div>
  <div class="queries-right-panel">
    <div class="queries-tabs-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-collapse-btn" id="queries-collapse-btn" title="Toggle Table">
          <fa fa-angles-left id="queries-collapse-icon"></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn active" data-tab="sql">
          <fa fa-database></fa>
          <span>SQL</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="json">
          <fa fa-code></fa>
          <span>JSON</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="markdown">
          <fa fa-file-lines></fa>
          <span>Markdown</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="richtext">
          <fa fa-pen-to-square></fa>
          <span>Rich Text</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary" style="flex:1; cursor:default;"></button>
      </div>
    </div>
    <div class="queries-tabs-content">
      <div class="queries-tab-pane active" id="queries-tab-sql">
        <!-- SQL Editor (CodeMirror) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-json">
        <!-- JSON Editor -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-markdown">
        <!-- Markdown Editor (CodeMirror) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-richtext">
        <!-- Rich Text Editor (SunEditor) -->
      </div>
    </div>
  </div>
</div>
