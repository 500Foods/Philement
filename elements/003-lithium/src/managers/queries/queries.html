<div class="manager-panels queries-manager-container">
  <div class="queries-left-panel" data-panel="left">
    <div class="queries-table-container lithium-table-container" id="queries-table-container">
      <!-- LithiumTable Tabulator table will be injected here -->
    </div>
    <div class="queries-navigator-container lithium-navigator-container" id="queries-navigator-container">
      <!-- LithiumTable Navigator block will be injected here -->
    </div>
  </div>
  <div class="lithium-splitter" data-splitter="left" id="queries-splitter"></div>
  <div class="queries-right-panel" data-panel="right">
    <!-- Standardized Toolbar -->
    <div class="lithium-toolbar" id="queries-toolbar">
      <button type="button" class="lithium-toolbar-btn lithium-collapse-btn" id="queries-collapse-btn" data-collapse-target="left" title="Toggle Table">
        <fa fa-angles-left class="lithium-collapse-icon"></fa>
      </button>
      <button type="button" class="lithium-toolbar-tab active" data-tab="sql" data-collapsible-text>
        <fa fa-database></fa>
        <span>SQL</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" data-tab="test" data-collapsible-text>
        <fa fa-flask></fa>
        <span>Test</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" data-tab="summary" data-collapsible-text>
        <fa fa-file-lines></fa>
        <span>Summary</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" data-tab="preview" data-collapsible-text>
        <fa fa-eye></fa>
        <span>Preview</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" data-tab="collection" data-collapsible-text>
        <fa fa-brackets-curly></fa>
        <span>Collection</span>
      </button>
      <!-- Placeholder fills available space -->
      <div class="lithium-toolbar-placeholder"></div>
      <button type="button" class="lithium-toolbar-btn" id="queries-undo-btn" data-collapsible-text title="Undo (Ctrl+Z)" disabled>
        <fa fa-rotate-left></fa>
        <span>Undo</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="queries-redo-btn" data-collapsible-text title="Redo (Ctrl+Y)" disabled>
        <fa fa-rotate-right></fa>
        <span>Redo</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="queries-fold-all-btn" data-collapsible-text title="Collapse All Folds">
        <fa fa-compress></fa>
        <span>Fold</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="queries-unfold-all-btn" data-collapsible-text title="Expand All Folds">
        <fa fa-expand></fa>
        <span>Unfold</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="queries-font-btn" title="Font Settings">
        <fa fa-font-case></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="queries-prettify-btn" title="Pretty Print SQL">
        <fa fa-flower-tulip></fa>
      </button>
    </div>
    <div class="queries-tabs-content">
      <div class="queries-tab-pane active" id="queries-tab-sql">
        <div class="queries-sql-editor" id="queries-sql-editor"></div>
      </div>
      <div class="queries-tab-pane" id="queries-tab-test">
        <!-- Test Tab (run query) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-summary">
        <!-- Summary Editor (CodeMirror with Markdown) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-preview">
        <!-- Preview (rendered Markdown HTML) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-collection">
        <!-- Collection Editor (JSON) -->
      </div>
    </div>
  </div>
</div>
