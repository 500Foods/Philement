<div id="profile-manager-page" class="manager-page">
  <div class="manager-panels profile-manager-container">
    <!-- Left Panel: User Options Table (Lookup 60) -->
    <div data-panel="left" id="profile-left-panel">
      <!-- Table Container -->
      <div class="table-container lithium-table-container" id="profile-table-container">
        <!-- Tabulator table will be injected here -->
      </div>

      <!-- Navigator -->
      <div class="navigator-container lithium-navigator-container" id="profile-navigator">
        <!-- Navigator block will be injected here -->
      </div>
    </div>

    <!-- Splitter between panels -->
    <div class="lithium-splitter" data-splitter="left" id="profile-splitter"></div>

    <!-- Right Panel: Tabbed Interface -->
    <div data-panel="right" id="profile-right-panel">
      <!-- Single Toolbar with tabs left, controls right -->
      <div class="lithium-toolbar" id="profile-tab-toolbar">
        <!-- Collapse button -->
        <button type="button" class="lithium-toolbar-btn lithium-collapse-btn" id="profile-collapse-btn" data-collapse-target="left" title="Toggle Options List">
          <fa fa-angles-left class="lithium-collapse-icon"></fa>
        </button>

        <!-- Current section button (icon + label from LithiumTable selection) -->
        <button type="button" class="lithium-toolbar-tab" id="btn-section-label" data-collapsible-text title="Select a Section">
          <fa fa-cog></fa>
          <span>Select a Section</span>
        </button>

        <!-- Collection toggle button -->
        <button type="button" class="lithium-toolbar-tab" data-tab="collection" id="tab-collection" data-collapsible-text>
          <fa fa-brackets-curly></fa>
          <span>Collection</span>
        </button>

        <div class="lithium-toolbar-placeholder"></div>

        <!-- Editor controls (right) - always visible -->
        <button type="button" class="lithium-toolbar-btn" id="btn-undo" data-collapsible-text data-editor-btn title="Undo (Ctrl+Z)">
          <fa fa-rotate-left></fa>
          <span>Undo</span>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="btn-redo" data-collapsible-text data-editor-btn title="Redo (Ctrl+Shift+Z)">
          <fa fa-rotate-right></fa>
          <span>Redo</span>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="btn-fold" data-collapsible-text data-editor-btn title="Fold All">
          <fa fa-compress></fa>
          <span>Fold</span>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="btn-unfold" data-collapsible-text data-editor-btn title="Unfold All">
          <fa fa-expand></fa>
          <span>Unfold</span>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="btn-font" data-editor-btn title="Font Size">
          <fa fa-font-case></fa>
        </button>
        <button type="button" class="lithium-toolbar-btn" id="btn-prettify" data-editor-btn title="Prettify JSON">
          <fa fa-flower-tulip></fa>
        </button>
      </div>

      <!-- Tab Content -->
      <div class="profile-tab-content" id="profile-tab-content">
        <!-- Settings Tab: Multiple pages based on index -->
        <div class="tab-panel active" data-panel-tab="settings" id="panel-settings">
          <div class="profile-content">
            <!-- Settings pages will be loaded dynamically here -->
          </div>
        </div> <!-- closes panel-settings -->

        <!-- Collection Tab: JSON CodeMirror -->
        <div class="tab-panel" data-panel-tab="collection" id="panel-collection">
          <div class="profile-collection-editor" id="collection-editor-container"></div>
        </div>
      </div> <!-- closes profile-tab-content -->
    </div>
  </div>
</div>
