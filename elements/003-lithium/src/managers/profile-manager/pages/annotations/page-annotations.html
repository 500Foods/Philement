<div class="settings-page" data-page-index="-14" id="settings-page--14">
<section class="profile-section">
<h3 class="section-title"><fa fa-note-sticky></fa> Annotations</h3>
<form class="preferences-form">
<div class="form-group">
<label class="form-label">Enable Annotations</label>
<select class="form-select" name="enableAnnotations">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Default Color</label>
<select class="form-select" name="defaultAnnotationColor">
<option value="yellow">Yellow</option>
<option value="green">Green</option>
<option value="blue">Blue</option>
<option value="red">Red</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Auto-save</label>
<select class="form-select" name="autoSaveAnnotations">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>
</form>
</section>
</div>
