<div class="manager-panels scripting-manager-container">
  <div class="scripting-left-panel" data-panel="left">
    <div class="scripting-table-container lithium-table-container" id="scripting-table-container">
      <!-- LithiumTable Tabulator table will be injected here -->
    </div>
    <div class="scripting-navigator-container lithium-navigator-container" id="scripting-navigator-container">
      <!-- LithiumTable Navigator block will be injected here -->
    </div>
  </div>
  <div class="lithium-splitter" data-splitter="left" id="scripting-splitter"></div>
  <div class="scripting-right-panel" data-panel="right">
    <!-- Standardized Toolbar -->
    <div class="lithium-toolbar" id="scripting-toolbar">
      <button type="button" class="lithium-toolbar-btn lithium-collapse-btn" id="scripting-collapse-btn" data-collapse-target="left" title="Toggle Table">
        <fa fa-angles-left class="lithium-collapse-icon"></fa>
      </button>
      <button type="button" class="lithium-toolbar-tab active" data-tab="lua" data-collapsible-text>
        <fa fa-code></fa>
        <span>Lua</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" data-tab="preview" data-collapsible-text>
        <fa fa-eye></fa>
        <span>Preview</span>
      </button>
      <!-- Placeholder fills available space -->
      <div class="lithium-toolbar-placeholder"></div>
      <button type="button" class="lithium-toolbar-btn" id="scripting-undo-btn" data-collapsible-text title="Undo (Ctrl+Z)" disabled>
        <fa fa-rotate-left></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="scripting-redo-btn" data-collapsible-text title="Redo (Ctrl+Y)" disabled>
        <fa fa-rotate-right></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="scripting-fold-all-btn" data-collapsible-text title="Collapse All Folds">
        <fa fa-compress></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="scripting-unfold-all-btn" data-collapsible-text title="Expand All Folds">
        <fa fa-expand></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="scripting-font-btn" title="Font Settings">
        <fa fa-font-case></fa>
      </button>
    </div>
    <div class="scripting-tabs-content">
      <div class="scripting-tab-pane active" id="scripting-tab-lua">
        <div class="editor-wrapper" id="scripting-lua-editor-wrapper">
          <div class="scripting-lua-editor" id="scripting-lua-editor">
            <!-- Lua Editor (CodeMirror with Lua syntax) -->
          </div>
          <div class="lithium-toolbar lithium-editor-footer" id="scripting-lua-editor-footer">
            <!-- Footer content will be populated by LithiumEditorFooter -->
          </div>
        </div>
      </div>
      <div class="scripting-tab-pane" id="scripting-tab-preview">
        <!-- Preview (rendered content) -->
      </div>
    </div>
  </div>
</div>
