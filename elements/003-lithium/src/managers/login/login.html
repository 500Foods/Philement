<!--
  Login Manager Template
  CCC-style login page: centered card, gradient header, clean inputs
-->
<div id="login-page">
  <div class="login-container">
    <!-- Header with logo and title -->
    <div class="login-header">
      <img src="/assets/images/logo-li.svg" alt="" class="login-logo" width="48" height="48">
      <div class="login-header-text">
        <h1>Lithium</h1>
        <p>A Philement Project</p>
      </div>
    </div>

    <!-- Login form -->
    <form class="login-form" id="login-form">
      <div class="form-group">
        <input 
          type="text" 
          id="login-username" 
          name="username"
          placeholder="Username" 
          required
          autocomplete="username"
          autofocus
        >
      </div>
      
      <div class="form-group">
        <input 
          type="password" 
          id="login-password" 
          name="password"
          placeholder="Password" 
          required
          autocomplete="current-password"
        >
      </div>

      <!-- Error message (hidden by default) -->
      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-circle"></i>
        <span id="login-error-text">Invalid username or password</span>
      </div>

      <!-- Submit button -->
      <button type="submit" class="login-btn" id="login-submit">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login</span>
      </button>
    </form>
  </div>
</div>
