<div class="manager-panels lookups-manager-container">
  <!-- Left Panel: Lookups List (Parent Table) -->
  <div class="lookups-left-panel" data-panel="left" id="lookups-left-panel">
    <div class="lookups-table-container lithium-table-container" id="lookups-parent-table-container">
      <!-- Parent Tabulator table will be injected here -->
    </div>
    <div class="lookups-navigator-container lithium-navigator-container" id="lookups-parent-navigator">
      <!-- Parent Navigator block will be injected here -->
    </div>
  </div>

  <!-- First Splitter between left and middle panels -->
  <div class="lithium-splitter" data-splitter="left" id="lookups-splitter-left"></div>

  <!-- Middle Panel: Lookup Values (Child Table) -->
  <div class="lookups-middle-panel" data-panel="middle" id="lookups-middle-panel">
    <div class="lookups-child-table-container lithium-table-container" id="lookups-child-table-container">
      <!-- Child Tabulator table will be injected here -->
    </div>
    <div class="lookups-navigator-container lithium-navigator-container" id="lookups-child-navigator">
      <!-- Child Navigator block will be injected here -->
    </div>
  </div>

  <!-- Second Splitter between middle and right panels -->
  <div class="lithium-splitter" data-splitter="right" id="lookups-splitter-right"></div>

  <!-- Right Panel: Tabbed View (JSON, Summary, Preview) -->
  <div class="lookups-right-panel" data-panel="right" id="lookups-right-panel">
    <!-- Toolbar Header -->
    <div class="lookups-tabs-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <!-- Collapse/Expand buttons for tables -->
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-collapse-left-btn lithium-collapse-btn" id="lookups-collapse-left-btn" data-collapse-target="left" title="Toggle Left Panel">
          <fa fa-angles-left id="lookups-collapse-left-icon" class="lithium-collapse-icon"></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-collapse-middle-btn lithium-collapse-btn" id="lookups-collapse-middle-btn" data-collapse-target="middle" title="Toggle Middle Panel">
          <fa fa-angles-left id="lookups-collapse-middle-icon" class="lithium-collapse-icon"></fa>
        </button>
        <!-- Tab buttons -->
        <button type="button" class="subpanel-header-btn subpanel-header-primary lookups-tab-btn active" data-tab="json">
          <fa fa-brackets-curly></fa>
          <span>Collection</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary lookups-tab-btn" data-tab="summary">
          <fa fa-file-lines></fa>
          <span>Summary</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary lookups-tab-btn" data-tab="preview">
          <fa fa-eye></fa>
          <span>Preview</span>
        </button>
        <!-- Placeholder to fill space -->
        <button type="button" class="subpanel-header-btn subpanel-header-primary lookups-toolbar-placeholder" tabindex="-1" aria-hidden="true"></button>
        <!-- Undo/Redo -->
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-toolbar-btn" id="lookups-undo-btn" title="Undo (Ctrl+Z)" disabled>
          <fa fa-rotate-left></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-toolbar-btn" id="lookups-redo-btn" title="Redo (Ctrl+Y)" disabled>
          <fa fa-rotate-right></fa>
        </button>
        <!-- Fold/Unfold -->
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-toolbar-btn" id="lookups-fold-all-btn" title="Collapse All Folds">
          <fa fa-compress></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-toolbar-btn" id="lookups-unfold-all-btn" title="Expand All Folds">
          <fa fa-expand></fa>
        </button>
        <!-- Font button -->
        <button type="button" class="subpanel-header-btn subpanel-header-close lookups-toolbar-btn" id="lookups-font-btn" title="Font Settings">
          <fa fa-font-case></fa>
        </button>
      </div>
    </div>

    <!-- Tab Panes -->
    <div class="lookups-tabs-content">
      <!-- JSON Tab -->
      <div class="lookups-tab-pane active" id="lookups-tab-json">
        <div class="lookups-json-editor" id="lookups-json-editor"></div>
      </div>

      <!-- Summary Tab -->
      <div class="lookups-tab-pane" id="lookups-tab-summary">
        <div class="lookups-summary-editor" id="lookups-summary-editor"></div>
      </div>

      <!-- Preview Tab -->
      <div class="lookups-tab-pane" id="lookups-tab-preview">
        <div class="lookups-preview-content" id="lookups-preview-content">
          <p class="lookups-preview-placeholder">Select a lookup entry to preview</p>
        </div>
      </div>
    </div>
  </div>
</div>
