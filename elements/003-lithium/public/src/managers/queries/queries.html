<div class="queries-manager-container">
  <div class="queries-left-panel" data-panel="left">
    <div class="queries-table-container lithium-table-container" id="queries-table-container">
      <!-- LithiumTable Tabulator table will be injected here -->
    </div>
    <div class="queries-navigator-container lithium-navigator-container" id="queries-navigator-container">
      <!-- LithiumTable Navigator block will be injected here -->
    </div>
  </div>
  <div class="lithium-splitter" data-splitter="left" id="queries-splitter"></div>
  <div class="queries-right-panel" data-panel="right">
    <div class="queries-tabs-header">
      <div class="subpanel-header-group" style="flex:1;min-width:0;">
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-collapse-btn lithium-collapse-btn" id="queries-collapse-btn" data-collapse-target="left" title="Toggle Table">
          <fa fa-angles-left id="queries-collapse-icon" class="lithium-collapse-icon"></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn active" data-tab="sql">
          <fa fa-database></fa>
          <span>SQL</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="test">
          <fa fa-flask></fa>
          <span>Test</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="summary">
          <fa fa-file-lines></fa>
          <span>Summary</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="preview">
          <fa fa-eye></fa>
          <span>Preview</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-tab-btn" data-tab="collection">
          <fa fa-brackets-curly></fa>
          <span>Collection</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-primary queries-toolbar-placeholder" tabindex="-1" aria-hidden="true"></button>
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-toolbar-btn" id="queries-undo-btn" title="Undo (Ctrl+Z)" disabled>
          <fa fa-rotate-left></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-toolbar-btn" id="queries-redo-btn" title="Redo (Ctrl+Y)" disabled>
          <fa fa-rotate-right></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-toolbar-btn" id="queries-font-btn" title="Font Settings">
          <fa fa-font-case></fa>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close queries-toolbar-btn" id="queries-prettify-btn" title="Pretty Print SQL">
          <fa fa-flower-tulip></fa>
        </button>
      </div>
    </div>
    <div class="queries-tabs-content">
      <div class="queries-tab-pane active" id="queries-tab-sql">
        <div class="queries-sql-editor" id="queries-sql-editor"></div>
      </div>
      <div class="queries-tab-pane" id="queries-tab-test">
        <!-- Test Tab (run query) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-summary">
        <!-- Summary Editor (CodeMirror with Markdown) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-preview">
        <!-- Preview (rendered Markdown HTML) -->
      </div>
      <div class="queries-tab-pane" id="queries-tab-collection">
        <!-- Collection Editor (JSON) -->
      </div>
    </div>
  </div>
</div>
