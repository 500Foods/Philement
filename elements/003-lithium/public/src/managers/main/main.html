<!--
  Main Menu Manager Template
  Layout: Sidebar (left, always visible) + Manager Area (right, content controlled by current manager)

  Manager Area uses "slots" — each loaded manager gets its own slot (header + workspace + footer)
  that crossfades in/out as a unit when switching managers.

  Sidebar: Gradient header, scrollable menu, icon footer (collapse/theme/profile/logs/logout)
  Manager Slot: Header (icon+name on left, xmark on right), Workspace, Footer (reports left, icons right)
-->

<!-- Logout Overlay and Panel - positioned outside main layout to overlay everything -->
<div class="logout-overlay" id="logout-overlay"></div>

<div class="logout-panel" id="logout-panel">
  <div class="logout-panel-inner">
    <!-- Header matching manager slot header style -->
    <div class="logout-panel-header">
      <div class="subpanel-header-group">
        <button type="button" class="subpanel-header-btn subpanel-header-primary">
          <fa fa-sign-out-alt></fa>
          <span>Select Logout Option</span>
        </button>
        <button type="button" class="subpanel-header-btn subpanel-header-close" id="logout-close-btn" title="Cancel (ESC)">
          <fa fa-xmark></fa>
        </button>
      </div>
    </div>
    <!-- Content area with logout options -->
    <div class="logout-panel-content">
      <div class="logout-options">
        <button type="button" class="logout-option" data-logout-type="quick">
          <span class="logout-option-type">Quick</span>
          <span class="logout-option-desc">Standard logout. Your session ends but cached data and preferences are preserved for your next visit.</span>
        </button>
        <button type="button" class="logout-option" data-logout-type="normal">
          <span class="logout-option-type">Normal</span>
          <span class="logout-option-desc">Logout without remembering your username. The login form will be empty next time.</span>
        </button>
        <button type="button" class="logout-option" data-logout-type="public">
          <span class="logout-option-type">Public</span>
          <span class="logout-option-desc">Clear all local data including cached content, settings, and session history. Use this on shared computers.</span>
        </button>
        <button type="button" class="logout-option" data-logout-type="global">
          <span class="logout-option-type">Global</span>
          <span class="logout-option-desc">Maximum security logout. Clears all local data and invalidates all your active sessions on the server.</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="main-layout">
  <!-- Mobile overlay for sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar (left side — Lithium chrome, always constrained here) -->
  <aside class="main-sidebar" id="sidebar" style="height: 100%;">
    <!-- Gradient header matching login panel -->
    <div class="sidebar-header-gradient">
      <img src="/assets/images/logo-li.svg" alt="" class="sidebar-logo" width="32" height="32">
      <div class="sidebar-header-text">
        <span class="sidebar-title">Lithium</span>
      </div>
      <!-- WebSocket status indicator -->
      <div class="ws-status disconnected" id="ws-status" data-tooltip="WebSocket: Disconnected">
        <span class="ws-status-icon"><fa fa-circle></fa></span>
      </div>
    </div>

    <!-- Menu items - scrollable -->
    <nav class="sidebar-menu" id="sidebar-menu">
      <!-- Manager buttons will be inserted here dynamically -->
    </nav>

    <!-- Footer with icon-only buttons matching login style -->
    <div class="sidebar-footer">
      <div class="sidebar-icon-group" id="sidebar-icon-group">
        <div class="sidebar-icon-wrapper" data-index="0">
          <button type="button" class="sidebar-icon-btn" id="sidebar-collapse-btn" title="Collapse sidebar">
            <fa fa-angles-left id="collapse-icon"></fa>
          </button>
        </div>
        <div class="sidebar-icon-wrapper" data-index="1">
          <button type="button" class="sidebar-icon-btn" id="sidebar-profile-btn" title="Profile">
            <fa fa-user-cog></fa>
          </button>
        </div>
        <div class="sidebar-icon-wrapper" data-index="2">
          <button type="button" class="sidebar-icon-btn" id="sidebar-theme-btn" title="Style Manager">
            <fa fa-palette></fa>
          </button>
        </div>
        <div class="sidebar-icon-wrapper" data-index="3">
          <button type="button" class="sidebar-icon-btn" id="sidebar-logs-btn" title="Session Log">
            <fa fa-receipt></fa>
          </button>
        </div>
        <div class="sidebar-icon-wrapper" data-index="4">
          <button type="button" class="sidebar-icon-btn sidebar-logout" id="sidebar-logout-btn" title="Logout">
            <fa fa-sign-out-alt></fa>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Splitter handle -->
  <div class="sidebar-splitter" id="sidebar-splitter"></div>

  <!-- Manager area (right side — entirely controlled by current manager) -->
  <div class="manager-area" id="manager-area">
    <!-- Mobile menu button (only visible on mobile, lives outside slots) -->
    <button class="mobile-menu-btn" id="mobile-menu-btn">
      <fa fa-bars></fa>
    </button>

    <!-- Manager slots are injected here by app.js / main.js -->
    <!-- Each slot: .manager-slot > (.manager-slot-header + .manager-slot-workspace + .manager-slot-footer) -->
  </div>
</div>
