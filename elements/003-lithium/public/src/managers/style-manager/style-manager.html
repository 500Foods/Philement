<div class="manager-panels style-manager-container">
  <!-- Left Panel: Lookup 41 Table -->
  <div data-panel="left" id="style-left-panel">
    <div class="style-lookup-table-container lithium-table-container" id="style-lookup-table-container">
      <!-- Lookup 41 Tabulator table will be injected here -->
    </div>
    <div class="style-lookup-navigator-container lithium-navigator-container" id="style-lookup-navigator">
      <!-- Lookup Navigator block will be injected here -->
    </div>
  </div>

  <!-- First Splitter between left and middle panels -->
  <div class="lithium-splitter" data-splitter="left" id="style-splitter-left"></div>

  <!-- Middle Panel: Sections Table -->
  <div data-panel="middle" id="style-middle-panel">
    <div class="style-sections-table-container lithium-table-container" id="style-sections-table-container">
      <!-- Sections Tabulator table will be injected here -->
    </div>
    <div class="style-sections-navigator-container lithium-navigator-container" id="style-sections-navigator">
      <!-- Sections Navigator block will be injected here -->
    </div>
  </div>

  <!-- Second Splitter between middle and right panels -->
  <div class="lithium-splitter" data-splitter="right" id="style-splitter-right"></div>

  <!-- Right Panel: Editor Area -->
  <div data-panel="right" id="style-right-panel">
    <!-- Main Toolbar: Section/JSON toggle + action buttons -->
    <div class="lithium-toolbar" id="style-main-toolbar">
      <!-- Collapse/Expand buttons for tables -->
      <button type="button" class="lithium-toolbar-btn lithium-collapse-btn" id="style-collapse-left-btn" data-collapse-target="left" title="Toggle Left Panel">
        <fa fa-angles-left class="lithium-collapse-icon"></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn lithium-collapse-btn" id="style-collapse-middle-btn" data-collapse-target="middle" title="Toggle Middle Panel">
        <fa fa-angles-left class="lithium-collapse-icon"></fa>
      </button>
      <!-- Section/JSON Mode Toggle (as tab buttons) -->
      <button type="button" class="lithium-toolbar-tab active" id="style-section-btn" data-mode="section" data-collapsible-text>
        <fa fa-eye></fa>
        <span>Section</span>
      </button>
      <button type="button" class="lithium-toolbar-tab" id="style-json-btn" data-mode="json" data-collapsible-text>
        <fa fa-brackets-curly></fa>
        <span>JSON</span>
      </button>
      <!-- Placeholder fills available space -->
      <div class="lithium-toolbar-placeholder"></div>
      <!-- Action buttons with collapsible text -->
      <button type="button" class="lithium-toolbar-btn" id="style-undo-btn" data-collapsible-text title="Undo (Ctrl+Z)" disabled>
        <fa fa-rotate-left></fa>
        <span>Undo</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="style-redo-btn" data-collapsible-text title="Redo (Ctrl+Shift+Z)" disabled>
        <fa fa-rotate-right></fa>
        <span>Redo</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="style-fold-all-btn" data-collapsible-text title="Collapse All Folds">
        <fa fa-compress></fa>
        <span>Fold</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="style-unfold-all-btn" data-collapsible-text title="Expand All Folds">
        <fa fa-expand></fa>
        <span>Unfold</span>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="style-font-btn" title="Font Settings">
        <fa fa-font-case></fa>
      </button>
      <button type="button" class="lithium-toolbar-btn" id="style-prettify-btn" title="Prettify (Ctrl+P)" disabled>
        <fa fa-flower-tulip></fa>
      </button>
    </div>

    <!-- Editor Content Area -->
    <div class="style-editor-content">
      <!-- Section View -->
      <div class="style-section-view active" id="style-section-view">
        <div class="style-mockup-container" id="style-mockup-container">
          <p class="style-placeholder">Select a section to view its mockup</p>
        </div>
        <div class="style-editor-panel" id="style-editor-panel" style="display: none;">
          <!-- Secondary Toolbar: Target name + state buttons -->
          <div class="lithium-toolbar" id="style-state-toolbar">
            <span class="lithium-toolbar-title" id="style-target-name">Select a target</span>
            <!-- Placeholder fills available space -->
            <div class="lithium-toolbar-placeholder"></div>
            <button type="button" class="lithium-toolbar-state-btn active" data-state="default" data-collapsible-text>Default</button>
            <button type="button" class="lithium-toolbar-state-btn" data-state=":hover" data-collapsible-text>:HOVER</button>
            <button type="button" class="lithium-toolbar-state-btn" data-state=":focus" data-collapsible-text>:FOCUS</button>
            <button type="button" class="lithium-toolbar-state-btn" data-state=":disabled" data-collapsible-text>:DISABLED</button>
            <button type="button" class="lithium-toolbar-state-btn css-state" data-state="css" data-collapsible-text>CSS</button>
          </div>
          <div class="style-property-editor" id="style-property-editor"></div>
          <div class="style-css-editor" id="style-css-editor" style="display: none;"></div>
          <div class="style-editor-actions">
            <button type="button" class="style-action-btn" id="style-apply-btn">Apply</button>
            <button type="button" class="style-action-btn" id="style-reset-btn">Reset</button>
            <button type="button" class="style-action-btn" id="style-copy-css-btn">Copy CSS</button>
          </div>
        </div>
      </div>

      <!-- JSON View -->
      <div class="style-json-view" id="style-json-view">
        <div class="editor-container" id="style-json-editor"></div>
      </div>
    </div>
  </div>
</div>
