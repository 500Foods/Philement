<div class="manager-panels style-manager-container">
  <!-- Left Panel: Dual Tables (Lookup 41 + Sections) -->
  <div data-panel="left" id="style-left-panel">
    <!-- Lookup 41 Table -->
    <div class="style-table-section">
      <div class="style-table-header">
        <span class="style-table-title">Lookup 41</span>
      </div>
      <div class="style-lookup-table-container lithium-table-container" id="style-lookup-table-container">
        <!-- Lookup 41 Tabulator table will be injected here -->
      </div>
      <div class="style-lookup-navigator lithium-navigator-container" id="style-lookup-navigator">
        <!-- Lookup Navigator block will be injected here -->
      </div>
    </div>

    <!-- Splitter between tables -->
    <div class="style-table-splitter" id="style-table-splitter"></div>

    <!-- Sections Table (Hardcoded) -->
    <div class="style-table-section">
      <div class="style-table-header">
        <span class="style-table-title">Sections</span>
      </div>
      <div class="style-sections-table-container lithium-table-container" id="style-sections-table-container">
        <!-- Sections Tabulator table will be injected here -->
      </div>
      <div class="style-sections-navigator lithium-navigator-container" id="style-sections-navigator">
        <!-- Sections Navigator block will be injected here -->
      </div>
    </div>
  </div>

  <!-- Main Splitter -->
  <div data-splitter="main" id="style-splitter-main"></div>

    <!-- Right Panel: Editor Area -->
  <div data-panel="right" id="style-right-panel">
    <!-- Mode Toggle Header -->
    <div class="style-mode-header">
      <div class="style-toolbar-left">
        <button type="button" class="style-collapse-btn" id="style-collapse-left-btn" title="Toggle Left Panel">
          <fa fa-angles-left id="style-collapse-left-icon"></fa>
        </button>
        <button type="button" class="style-collapse-btn" id="style-collapse-tables-btn" title="Toggle Tables Panel">
          <fa fa-angles-left id="style-collapse-tables-icon"></fa>
        </button>
        <div class="style-toolbar-separator"></div>
        <div class="style-mode-toggle">
          <button type="button" class="style-mode-btn active" id="style-section-btn" title="Section View">
            <fa fa-eye></fa>
            <span>Section</span>
          </button>
          <button type="button" class="style-mode-btn" id="style-json-btn" title="JSON View">
            <fa fa-brackets-curly></fa>
            <span>JSON</span>
          </button>
        </div>
      </div>
      <div class="style-toolbar-right">
        <button type="button" class="style-toolbar-btn" id="style-undo-btn" title="Undo (Ctrl+Z)">
          <fa fa-rotate-left></fa>
        </button>
        <button type="button" class="style-toolbar-btn" id="style-redo-btn" title="Redo (Ctrl+Shift+Z)">
          <fa fa-rotate-right></fa>
        </button>
        <div class="style-toolbar-separator"></div>
        <button type="button" class="style-toolbar-btn" id="style-font-btn" title="Font Settings">
          <fa fa-font-case></fa>
        </button>
        <button type="button" class="style-toolbar-btn" id="style-prettify-btn" title="Prettify (Ctrl+P)">
          <fa fa-flower-tulip></fa>
        </button>
      </div>
    </div>

    <!-- Editor Content Area -->
    <div class="style-editor-content">
      <!-- Section View -->
      <div class="style-section-view active" id="style-section-view">
        <div class="style-mockup-container" id="style-mockup-container">
          <p class="style-placeholder">Select a section to view its mockup</p>
        </div>
        <div class="style-editor-panel" id="style-editor-panel" style="display: none;">
          <!-- Target circle indicator -->
          <div class="style-target-header">
            <span class="style-target-label" id="style-target-label">Target Element</span>
          </div>
          <!-- Style property editor will be injected here -->
          <div class="style-property-editor" id="style-property-editor"></div>
          <!-- Editor actions -->
          <div class="style-editor-actions">
            <button type="button" class="style-action-btn" id="style-apply-btn">Apply</button>
            <button type="button" class="style-action-btn" id="style-reset-btn">Reset</button>
            <button type="button" class="style-action-btn" id="style-copy-css-btn">Copy CSS</button>
          </div>
        </div>
      </div>

      <!-- JSON View -->
      <div class="style-json-view" id="style-json-view">
        <div class="editor-container" id="style-json-editor"></div>
      </div>
    </div>
  </div>
</div>
