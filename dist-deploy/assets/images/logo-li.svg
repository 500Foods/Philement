<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     style="background: transparent; background-color: transparent; color-scheme: light dark;"
     version="1.1"
     width="111px" height="111px"
     viewBox="-5 -5 111 111">

  <!-- Large outer circle – orbital boundary -->
  <g transform="translate(0.5, 0.5)">
    <ellipse cx="50" cy="50" rx="50" ry="50"
             fill="transparent"
             stroke="#000000"
             pointer-events="all"
             style="stroke: rgb(0, 0, 0);"/>
 </g>

  <!-- inner  circle – orbital boundary -->
  <g transform="translate(0.5, 0.5)">
    <ellipse cx="50" cy="50" rx="33" ry="33"
             fill="transparent"
	     stroke="#000000"
	     pointer-events="all"
	     style="stroke: rgb(0, 0, 0);"/>
  </g>

  <!-- Central nucleus -->
  <g transform="translate(0.5, 0.5)">
    <ellipse cx="50" cy="50" rx="15" ry="15"
             fill="#ffffff"
             stroke="#000000"
             pointer-events="all"
             style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212));
                    stroke: light-dark(rgb(0,0,0), rgb(255,255,255));"/>
  </g>

  <!-- "Li" symbol in center -->
  <g>
    <switch>
      <foreignObject style="overflow: visible; text-align: left;"
                     pointer-events="none"
                     width="100%" height="100%"
                     requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility">
        <div xmlns="http://www.w3.org/1999/xhtml"
             style="display: flex; align-items: unsafe center; justify-content: unsafe center;
                    width: 28px; height: 1px; padding-top: 50px; margin-left: 36px;">
          <div style="box-sizing: border-box; font-size: 0; text-align: center; color: #000000;">
            <div style="display: inline-block; font-size: 16px; font-family: 'Vanadium Sans Semi-Extended';
                        color: light-dark(#000000, #ffffff); line-height: 1.2;
                        pointer-events: all; white-space: normal; word-wrap: normal;">
              Li
            </div>
          </div>
        </div>
      </foreignObject>
      <!-- Plain text fallback -->
      <text x="50" y="55"
            fill="light-dark(#000000, #ffffff)"
            font-family="'Vanadium Sans Semi-Extended'"
            font-size="16px"
            text-anchor="middle">Li</text>
    </switch>
  </g>

  <!-- All three electrons – orbiting together at 120° spacing -->
  <g class="orbit-one">
    <g transform="translate(0.5, 0.5)">

      <!-- Electron 1 @ 0° (right) – outer -->
      <g transform="translate(79,10)">
        <ellipse cx="5" cy="5" rx="5" ry="5"
                 fill="#ffffff" stroke="#000000"
                 style="fill: rgb(255, 255, 255); stroke: rgb(0, 0, 0);"/>
      </g>

    </g>
  </g>

  <g class="orbit-two">
    <g transform="translate(0.5, 0.5)">
      <!-- Electron 2 @ 120° -->
      <g transform="translate(22, 22)">
        <ellipse cx="5" cy="5" rx="5" ry="5"
                 fill="#ffffff" stroke="#000000"
                 style="fill: rgb(255, 255, 255); stroke: rgb(0, 0, 0);"/>
      </g>

      <!-- Electron 3 @ 240° -->
      <g transform="translate(68,68)">
        <ellipse cx="5" cy="5" rx="5" ry="5"
                 fill="#ffffff" stroke="#000000"
                 style="fill: rgb(255, 255, 255); stroke: rgb(0, 0, 0);"/>
      </g>

    </g>
  </g>

  <!-- Animation – all electrons rotate together -->
  <style>
    .orbit-one {
      transform-origin: 50px 50px;
      animation: orbit 5.0s linear infinite;
    }
    .orbit-two {
      transform-origin: 50px 50px;
      animation: orbit 2.5s linear infinite;
    }
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>

</svg>
